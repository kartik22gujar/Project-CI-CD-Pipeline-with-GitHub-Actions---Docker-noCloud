  name: CI-CD Pipeline with Docker (No Cloud)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-ci-cd:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Python (for testing)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Step 3: Install dependencies & run tests
      - name: Install dependencies and run tests
        run: |
          pip install -r requirements.txt
          pytest

       # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      # Step 4: Build Docker Image
      - name: Build Docker Image
        run: docker build -t myapp:latest .

      # Step 5: Run Docker Container (Test Container)
      - name: Run Container Test
        run: |
          docker run -d -p 5000:5000 --name testcontainer myapp:latest
          sleep 5
          curl http://localhost:5000

      # Step 6: Stop and remove container
      - name: Cleanup Container
        run: |
          docker stop testcontainer
          docker rm testcontainer

      # Step 7: Save Docker Image as artifact (CD part)
      - name: Save Docker image to file
        run: docker save myapp:latest -o myapp.tar

      # Step 8: Upload Docker image artifact
      - name: Upload Docker Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: myapp.tar